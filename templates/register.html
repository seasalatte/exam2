{% extends "base.html" %}
{% block title %}會員註冊{% endblock %}
{% block content %}
<article>
    <header>
        <h2>會員註冊</h2>
    </header>
    <form action="{{ url_for('register_route') }}" method="POST">
        <label for="username">帳號</label>
        <input type="text" id="username" name="username" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="password">密碼</label>
        <input type="password" id="password" name="password" required>

        <label for="phone">電話 (選填)</label>
        <input type="tel" id="phone" name="phone" placeholder="09XXXXXXXX">

        <label for="birthdate">出生日期</label>
        <input type="date" id="birthdate" name="birthdate" required>

        <button type="submit" class="contrast">送出註冊</button>
    </form>
</article>
{% endblock %}
