{% extends "base.html" %}
{% block title %}會員清單{% endblock %}
{% block content %}
<article>
    <header>
        <h2>會員清單</h2>
    </header>
    <div class="overflow-auto">
        <table class="striped">
            <thead>
                <tr>
                    <th scope="col">帳號</th>
                    <th scope="col">Email</th>
                    <th scope="col">電話</th>
                    <th scope="col">出生日期</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.username }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.phone | mask_phone }}</td>
                    <td>{{ user.birthdate | format_tw_date }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</article>
{% endblock %}
